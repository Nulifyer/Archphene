name: Bug report
description: Report reproducible Archphene behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use GitHub private vulnerability reporting.
  - type: input
    id: version
    attributes:
      label: Archphene version
      description: Release tag or commit SHA
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: Pixel 8, GrapheneOS/Android 16 or emulator API 36
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: CPU architecture
      options:
        - arm64-v8a / AArch64
        - x86_64
        - Other
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Linux application and package version
      placeholder: kcalc 26.04.3-1
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest repeatable sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove tokens, personal files, and unrelated device data.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I tested the latest release or main branch.
          required: true
        - label: I searched existing issues.
          required: true
        - label: This is not a security vulnerability.
          required: true