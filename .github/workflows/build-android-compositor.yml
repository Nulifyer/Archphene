name: Build Android compositor

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-android-compositor.yml"
      - "containers/android-native.Containerfile"
      - "native/archphene-compositor/**"
  pull_request:
    paths:
      - ".github/workflows/build-android-compositor.yml"
      - "containers/android-native.Containerfile"
      - "native/archphene-compositor/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-compositor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build descriptor-safe compositor for both ABIs
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Android native toolchain
        run: docker build -f containers/android-native.Containerfile -t archphene-android-native:ci .

      - name: Check formatting and host tests
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -v archphene-cargo-registry:/opt/cargo/registry \
            -w /workspace/native/archphene-compositor \
            archphene-android-native:ci \
            bash -lc 'cargo fmt --check && cargo test --locked'

      - name: Build Android libraries
        run: |
          for target in x86_64-linux-android aarch64-linux-android; do
            docker run --rm \
              -v "$PWD:/workspace" \
              -v archphene-cargo-registry:/opt/cargo/registry \
              -w /workspace/native/archphene-compositor \
              archphene-android-native:ci \
              bash -lc "cargo build --target $target --release --locked"
          done

      - name: Verify ELF architecture and page alignment
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            archphene-android-native:ci bash -lc '
              set -euo pipefail
              readelf_bin="$ANDROID_SDK_ROOT/ndk/29.0.14206865/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
              x86=native/archphene-compositor/target/x86_64-linux-android/release/libarchphene_compositor.so
              arm=native/archphene-compositor/target/aarch64-linux-android/release/libarchphene_compositor.so
              "$readelf_bin" -h "$x86" | grep -F "Advanced Micro Devices X86-64"
              "$readelf_bin" -h "$arm" | grep -F "AArch64"
              for library in "$x86" "$arm"; do
                count=0
                while read -r alignment; do
                  ((count += 1))
                  ((alignment >= 16384)) || {
                    echo "LOAD segment alignment is below 16 KiB: $library $alignment" >&2
                    exit 1
                  }
                done < <("$readelf_bin" -lW "$library" | \
                  awk "\$1 == \"LOAD\" { print \$NF }")
                ((count > 0)) || { echo "ELF has no LOAD segments: $library" >&2; exit 1; }
              done
            '

      - name: Upload Android compositor libraries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archphene-android-compositor-${{ github.sha }}
          path: |
            native/archphene-compositor/target/x86_64-linux-android/release/libarchphene_compositor.so
            native/archphene-compositor/target/aarch64-linux-android/release/libarchphene_compositor.so
          if-no-files-found: error
          retention-days: 14