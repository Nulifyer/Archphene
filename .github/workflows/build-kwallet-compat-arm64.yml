name: Build KWallet ARM64 Compatibility Daemon

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-kwallet-compat-arm64.yml"
      - "native/archphene-kwallet/**"
      - "scripts/build-kwallet-compat-runtime.sh"
      - "scripts/build-android-glibc-runtime.sh"
      - "scripts/build-libsecret-probe-runtime.sh"
      - "patches/glibc/**"

permissions:
  contents: read

concurrency:
  group: build-kwallet-compat-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build patched KWallet daemon on AArch64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Import official Arch Linux ARM userspace
        run: |
          rootfs="$RUNNER_TEMP/archlinuxarm-aarch64.tar.gz"
          curl --fail --location --retry 3 \
            --output "$rootfs" \
            http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz
          curl --fail --location --retry 3 \
            --output "$rootfs.sig" \
            http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz.sig

          export GNUPGHOME="$RUNNER_TEMP/archlinuxarm-gnupg"
          mkdir -m700 "$GNUPGHOME"
          signing_key=68B3537F39A313B3E574D06777193F152BDBE6A6
          gpg --batch --keyserver hkps://keyserver.ubuntu.com --recv-keys "$signing_key"
          fingerprint="$(gpg --batch --with-colons --fingerprint "$signing_key" \
            | awk -F: '$1 == "fpr" { print $10; exit }')"
          test "$fingerprint" = "$signing_key"
          gpg --batch --verify "$rootfs.sig" "$rootfs"

          docker import "$rootfs" archphene/archlinuxarm:aarch64

      - name: Build Android-compatible KWallet runtime
        run: |
          docker run --rm \
            -e JOBS=4 \
            -v "$PWD:/workspace" \
            -w /workspace \
            archphene/archlinuxarm:aarch64 \
            bash -lc '
              set -euo pipefail
              bash scripts/build-kwallet-compat-runtime.sh
              bash scripts/build-android-glibc-runtime.sh
              bash scripts/build-libsecret-probe-runtime.sh
            '

      - name: Verify complete ARM64 runtime closure
        run: |
          daemon=tooling/build/kwallet-compat/aarch64
          runtime=tooling/build/libsecret-probe/aarch64
          test -x "$daemon/kwalletd6"
          test -x "$runtime/kwalletd6"
          test -x "$runtime/kwallet-query"
          test -x "$runtime/gdbus"
          test -x "$runtime/secret-tool"
          test -f "$runtime/lib/ld-linux-aarch64.so.1"
          test -f "$runtime/qt/plugins/platforms/libqminimal.so"
          (cd "$daemon" && sha256sum --check SHA256SUMS)
          (cd "$runtime" && sha256sum --check SHA256SUMS)
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            archphene/archlinuxarm:aarch64 \
            bash -lc '
              set -euo pipefail
              runtime=tooling/build/libsecret-probe/aarch64
              for object in "$runtime/kwalletd6" "$runtime/kwallet-query" \
                  "$runtime/gdbus" "$runtime/secret-tool" "$runtime"/lib/*; do
                readelf -h "$object" | grep -F AArch64 >/dev/null
                while read -r alignment; do
                  (( alignment >= 0x4000 ))
                done < <(readelf -lW "$object" | awk "/ LOAD / { print \$NF }")
              done
            '

      - name: Upload verified ARM64 runtime
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archphene-kwallet-runtime-aarch64-${{ github.sha }}
          path: |
            tooling/build/kwallet-compat/aarch64
            tooling/build/libsecret-probe/aarch64
          if-no-files-found: error
          retention-days: 14
