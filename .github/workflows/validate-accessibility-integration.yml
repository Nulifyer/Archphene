name: Validate Accessibility Integration

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/validate-accessibility-integration.yml"
      - "prototypes/accessibility-capability-probe/**"
      - "prototypes/shared-android-bridge/src/org/archphene/bridge/**"
      - "native/archphene-android-capability/**"
      - "scripts/build-accessibility-capability-probe.sh"
  pull_request:
    paths:
      - ".github/workflows/validate-accessibility-integration.yml"
      - "prototypes/accessibility-capability-probe/**"
      - "prototypes/shared-android-bridge/src/org/archphene/bridge/**"
      - "native/archphene-android-capability/**"
      - "scripts/build-accessibility-capability-probe.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-accessibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build framework probes for both ABIs
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android build tools and NDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.14206865"

      - name: Create test-only signing key
        run: |
          keytool -genkeypair -noprompt \
            -keystore "$RUNNER_TEMP/accessibility-probe.keystore" \
            -storepass android -keypass android -alias androiddebugkey \
            -dname "CN=Archphene Accessibility Probe,O=Archphene,C=US" \
            -keyalg RSA -keysize 2048 -validity 30

      - name: Build and verify both ABIs
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/accessibility-probe.keystore
          KEY_ALIAS: androiddebugkey
          KEYSTORE_PASSWORD: android
          KEY_PASSWORD: android
          ANDROID_BUILD_TOOLS_VERSION: 36.0.0
          NDK_VERSION: 29.0.14206865
        run: |
          for abi in x86_64 arm64-v8a; do
            ANDROID_ABI="$abi" bash scripts/build-accessibility-capability-probe.sh
          done

      - name: Upload test probe APKs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archphene-accessibility-probes-${{ github.sha }}
          path: prototypes/accessibility-capability-probe/out-*/archphene-accessibility-probe.apk
          if-no-files-found: error
          retention-days: 14
