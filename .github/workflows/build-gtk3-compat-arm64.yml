name: Build GTK3 ARM64 Compatibility Payload

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-gtk3-compat-arm64.yml"
      - "scripts/build-gtk3-compat-arm64.sh"

permissions:
  contents: read

concurrency:
  group: build-gtk3-compat-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build no-Glycin GTK3 libraries on AArch64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Import official Arch Linux ARM userspace
        run: |
          rootfs="$RUNNER_TEMP/archlinuxarm-aarch64.tar.gz"
          curl --fail --location --retry 3 \
            --output "$rootfs" \
            http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz
          curl --fail --location --retry 3 \
            --output "$rootfs.sig" \
            http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz.sig

          export GNUPGHOME="$RUNNER_TEMP/archlinuxarm-gnupg"
          mkdir -m700 "$GNUPGHOME"
          signing_key=68B3537F39A313B3E574D06777193F152BDBE6A6
          gpg --batch --keyserver hkps://keyserver.ubuntu.com --recv-keys "$signing_key"
          fingerprint="$(gpg --batch --with-colons --fingerprint "$signing_key" \
            | awk -F: '$1 == "fpr" { print $10; exit }')"
          test "$fingerprint" = "$signing_key"
          gpg --batch --verify "$rootfs.sig" "$rootfs"

          docker import "$rootfs" archphene/archlinuxarm:aarch64

      - name: Build and inspect compatibility libraries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            archphene/archlinuxarm:aarch64 \
            bash scripts/build-gtk3-compat-arm64.sh

      - name: Upload verified ARM64 payload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archphene-gtk3-compat-aarch64-${{ github.sha }}
          path: tooling/build/gtk3-compat/aarch64
          if-no-files-found: error
          retention-days: 14
