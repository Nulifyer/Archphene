name: Validate source

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-source-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Repository and source contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate public repository and release contracts
        run: |
          find scripts research -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          bash scripts/test-bash-test-helpers.sh
          python3 scripts/test-public-repository.py
          python3 scripts/test-release-workflow-contract.py
      - name: Validate private AT-SPI source contract
        run: python3 scripts/test-atspi-source-contract.py
