name: Publish Archphene APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to receive the APK
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and attach signed APK
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      GH_TOKEN: ${{ github.token }}
      KEYSTORE_BASE64: ${{ secrets.ARCHPHENE_RELEASE_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.ARCHPHENE_RELEASE_STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ARCHPHENE_RELEASE_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ARCHPHENE_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        shell: pwsh
        run: |
          sdkmanager.bat "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Resolve release version
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v(\d+)\.(\d+)\.(\d+)(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Release tag must use vMAJOR.MINOR.PATCH syntax"
          }
          $versionName = $env:RELEASE_TAG.Substring(1)
          $runNumber = [int64]$env:GITHUB_RUN_NUMBER
          if ($runNumber -ge 1000000000) {
            throw "GitHub run number exceeds Android versionCode range"
          }
          $versionCode = 1000000000 + $runNumber
          "VERSION_NAME=$versionName" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION_CODE=$versionCode" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "APK_NAME=Archphene-$versionName.apk" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore release signing key
        shell: pwsh
        run: |
          foreach ($name in @("KEYSTORE_BASE64", "KEYSTORE_PASSWORD", "KEY_ALIAS", "KEY_PASSWORD")) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name").Value)) {
              throw "Required release signing secret $name is missing"
            }
          }
          $keyPath = Join-Path $env:RUNNER_TEMP "archphene-release.keystore"
          [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:KEYSTORE_BASE64))
          "KEYSTORE_PATH=$keyPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build signed Archphene APK
        shell: pwsh
        run: |
          ./scripts/build-install-linux-manager-stub.ps1 -SkipInstall -ReleaseBuild `
            -AndroidSdk $env:ANDROID_HOME `
            -VersionCode ([int]$env:VERSION_CODE) `
            -VersionName $env:VERSION_NAME `
            -KeystorePath $env:KEYSTORE_PATH `
            -KeystorePassword $env:KEYSTORE_PASSWORD `
            -KeyAlias $env:KEY_ALIAS `
            -KeyPassword $env:KEY_PASSWORD

      - name: Verify and name release artifact
        shell: pwsh
        run: |
          $source = "prototypes/linux-app-manager-stub/out/archpheneos-manager.apk"
          $asset = Join-Path $env:RUNNER_TEMP $env:APK_NAME
          Copy-Item -LiteralPath $source -Destination $asset
          & "$env:ANDROID_HOME/build-tools/36.0.0/apksigner.bat" verify --verbose --print-certs $asset
          if ($LASTEXITCODE -ne 0) { throw "APK signature verification failed" }
          $hash = (Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $env:APK_NAME" | Set-Content -LiteralPath "$asset.sha256" -NoNewline -Encoding ascii
          "APK_PATH=$asset" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Archphene-${{ env.VERSION_NAME }}
          path: |
            ${{ env.APK_PATH }}
            ${{ env.APK_PATH }}.sha256
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        shell: pwsh
        run: |
          gh release upload $env:RELEASE_TAG $env:APK_PATH "$env:APK_PATH.sha256" --clobber