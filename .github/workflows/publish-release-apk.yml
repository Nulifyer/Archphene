name: Publish Archphene APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to receive the APK
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and attach signed APK
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      GH_TOKEN: ${{ github.token }}
      KEYSTORE_BASE64: ${{ secrets.ARCHPHENE_RELEASE_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.ARCHPHENE_RELEASE_STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ARCHPHENE_RELEASE_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ARCHPHENE_RELEASE_KEY_PASSWORD }}
      DEBUGGABLE: "false"

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Verify Linux container engine
        run: docker version

      - name: Build verified Arch runtimes and patched glibc
        run: |
          bash scripts/build-ci-package-runtime.sh
          bash scripts/build-ci-package-runtime-arm64.sh

      - name: Build shared Android compositor and Terminal PTY
        run: |
          docker build -f containers/android-native.Containerfile \
            -t archphene-android-native:release .
          for target in x86_64-linux-android aarch64-linux-android; do
            docker run --rm \
              -v "$PWD:/workspace" \
              -v archphene-cargo-registry:/opt/cargo/registry \
              -w /workspace/native/archphene-compositor \
              archphene-android-native:release \
              bash -lc "cargo build --target $target --release --locked"
          done
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            archphene-android-native:release \
            bash -lc '
              set -euo pipefail
              ndk="$ANDROID_SDK_ROOT/ndk/29.0.14206865/toolchains/llvm/prebuilt/linux-x86_64/bin"
              mkdir -p native/archphene-terminal/out/{x86_64,aarch64}
              "$ndk/x86_64-linux-android29-clang" -shared -fPIC -O2 -Wall -Wextra -Werror \
                -Wl,-z,relro,-z,now -o native/archphene-terminal/out/x86_64/libtermux.so \
                native/archphene-terminal/terminal_pty.c
              "$ndk/aarch64-linux-android29-clang" -shared -fPIC -O2 -Wall -Wextra -Werror \
                -Wl,-z,relro,-z,now -o native/archphene-terminal/out/aarch64/libtermux.so \
                native/archphene-terminal/terminal_pty.c
            '

      - name: Build Android capability and desktop integration payloads
        run: |
          docker build -f containers/arm-runtime-builder.Containerfile \
            -t archphene-arm-runtime-builder:release .
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            archlinux:base-devel bash -lc '
              set -euo pipefail
              mkdir -p tooling/build/android-capability/x86_64
              gcc -shared -fPIC -O2 -Wall -Wextra -Werror \
                -o tooling/build/android-capability/x86_64/libarchphene_android.so \
                native/archphene-android-capability/archphene_android.c
            '
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            archphene-arm-runtime-builder:release bash -lc '
              set -euo pipefail
              mkdir -p tooling/build/android-capability/aarch64
              aarch64-linux-gnu-gcc -shared -fPIC -O2 -Wall -Wextra -Werror \
                -o tooling/build/android-capability/aarch64/libarchphene_android.so \
                native/archphene-android-capability/archphene_android.c
            '
          for architecture in x86_64 aarch64; do
            docker run --rm \
              -v "$PWD:/workspace" -w /workspace \
              archphene-android-native:release \
              bash scripts/build-android-dbus.sh "$architecture"
            docker run --rm \
              -v "$PWD:/workspace" -w /workspace \
              archphene-android-native:release \
              bash scripts/build-android-pulse.sh "$architecture"
          done

      - name: Build pinned private PipeWire camera runtimes
        run: |
          source_dir=tooling/external/pipewire
          expected=b741e0c74f5436f0c925f7741140db0efd32cf4e
          mkdir -p "$source_dir"
          git -C "$source_dir" init
          git -C "$source_dir" remote add origin \
            https://gitlab.freedesktop.org/pipewire/pipewire.git
          git -C "$source_dir" fetch --depth=1 origin "$expected"
          git -C "$source_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$source_dir" rev-parse HEAD)" = "$expected"
          for architecture in x86_64 aarch64; do
            docker run --rm \
              -v "$PWD:/workspace" -w /workspace \
              archphene-arm-runtime-builder:release bash -lc \
              "pacman -Sy --noconfirm --needed meson >/dev/null && \
               bash scripts/build-pipewire-camera-runtime.sh $architecture"
          done

      - name: Test private PipeWire camera runtime
        run: |
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            archlinux:base-devel bash -lc \
            "pacman -Sy --noconfirm --needed pipewire gstreamer \
             gst-plugin-pipewire gst-plugins-base jq >/dev/null && \
             bash scripts/test-pipewire-camera-runtime.sh"

      - name: Build Android GPU helpers
        run: |
          for architecture in x86_64 aarch64; do
            docker run --rm \
              -v "$PWD:/workspace" \
              -w /workspace \
              archphene-android-native:release \
              bash scripts/build-android-gpu-helper.sh "$architecture"
          done

      - name: Resolve release version
        run: |
          if [[ "$RELEASE_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
            version_name="${RELEASE_TAG#v}"
          else
            echo "Release tag must use vMAJOR.MINOR.PATCH syntax" >&2
            exit 1
          fi
          if (( GITHUB_RUN_NUMBER >= 1000000000 )); then
            echo "GitHub run number exceeds Android versionCode range" >&2
            exit 1
          fi
          {
            echo "VERSION_NAME=$version_name"
            echo "VERSION_CODE=$((1000000000 + GITHUB_RUN_NUMBER))"
            echo "APK_X86_NAME=Archphene-x86_64-$version_name.apk"
            echo "APK_ARM64_NAME=Archphene-arm64-v8a-$version_name.apk"
          } >> "$GITHUB_ENV"

      - name: Restore release signing key
        run: |
          for name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            [[ -n "${!name}" ]] || {
              echo "Required release signing secret $name is missing" >&2
              exit 1
            }
          done
          key_path="$RUNNER_TEMP/archphene-release.keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$key_path"
          echo "KEYSTORE_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build signed ABI-specific APKs on Linux
        run: |
          for abi in x86_64 arm64-v8a; do
            ARCHPHENE_ABI="$abi" bash scripts/build-linux-manager-apk.sh
            if [[ "$abi" == "x86_64" ]]; then
              name="$APK_X86_NAME"
            else
              name="$APK_ARM64_NAME"
            fi
            bash scripts/verify-release-apk.sh \
              prototypes/linux-app-manager-stub/out-linux/archphene.apk \
              "$abi" "$VERSION_NAME"
            cp prototypes/linux-app-manager-stub/out-linux/archphene.apk \
              "$RUNNER_TEMP/$name"
          done

      - name: Verify release artifacts
        run: |
          for name in "$APK_X86_NAME" "$APK_ARM64_NAME"; do
            asset="$RUNNER_TEMP/$name"
            "$ANDROID_HOME/build-tools/36.0.0/apksigner" \
              verify --verbose --print-certs "$asset"
            "$ANDROID_HOME/build-tools/36.0.0/zipalign" \
              -c -P 16 -v 4 "$asset"
            sha256sum "$asset" | sed "s|  .*|  $name|" \
              > "$asset.sha256"
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Archphene-${{ env.VERSION_NAME }}
          path: |
            ${{ runner.temp }}/${{ env.APK_X86_NAME }}
            ${{ runner.temp }}/${{ env.APK_X86_NAME }}.sha256
            ${{ runner.temp }}/${{ env.APK_ARM64_NAME }}
            ${{ runner.temp }}/${{ env.APK_ARM64_NAME }}.sha256
          if-no-files-found: error

      - name: Attach APKs to GitHub Release
        run: |
          gh release upload "$RELEASE_TAG" \
            "$RUNNER_TEMP/$APK_X86_NAME" \
            "$RUNNER_TEMP/$APK_X86_NAME.sha256" \
            "$RUNNER_TEMP/$APK_ARM64_NAME" \
            "$RUNNER_TEMP/$APK_ARM64_NAME.sha256"
